name: Close Stale Issues

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-branch-activity:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check Branch Activity
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.repository.default_branch;
            const { owner, repo } = context.repo;

            const { data: branchData } = await github.rest.repos.getBranch({
              owner,
              repo,
              branch,
            });

            const lastCommitTime = new Date(branchData.commit.commit.committer.date).getTime();
            const oneYearMs = 365 * 24 * 60 * 60 * 1000;
            const shouldRun = Date.now() - lastCommitTime <= oneYearMs;

            core.info(`default branch: ${branch}`);
            core.info(`last commit at: ${branchData.commit.commit.committer.date}`);
            core.info(`stale workflow enabled: ${shouldRun}`);
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

  stale:
    needs: check-branch-activity
    if: ${{ needs.check-branch-activity.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Exempt Pinned Issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const exemptLabel = 'pinned';

            // Ensure the exemption label exists.
            try {
              await github.rest.issues.getLabel({ owner, repo, name: exemptLabel });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: exemptLabel,
                  color: '0052cc',
                  description: 'Pinned issue; exempt from stale automation.',
                });
              } else {
                throw error;
              }
            }

            const pinnedIssueNumbers = [];
            let hasNextPage = true;
            let cursor = null;

            // Fetch all pinned issues via GraphQL.
            while (hasNextPage) {
              const result = await github.graphql(
                `
                query($owner: String!, $repo: String!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pinnedIssues(first: 100, after: $cursor) {
                      nodes {
                        content {
                          __typename
                          ... on Issue {
                            number
                          }
                        }
                      }
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                    }
                  }
                }
                `,
                { owner, repo, cursor }
              );

              const nodes = result.repository.pinnedIssues.nodes || [];
              for (const n of nodes) {
                if (n.content?.__typename === 'Issue' && typeof n.content.number === 'number') {
                  pinnedIssueNumbers.push(n.content.number);
                }
              }

              hasNextPage = result.repository.pinnedIssues.pageInfo.hasNextPage;
              cursor = result.repository.pinnedIssues.pageInfo.endCursor;
            }

            let exempted = 0;
            for (const issueNumber of pinnedIssueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });

              if (issue.state !== 'open') continue;

              const hasLabel = issue.labels.some((l) => {
                if (typeof l === 'string') return l === exemptLabel;
                return l?.name === exemptLabel;
              });
              if (hasLabel) continue;

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [exemptLabel],
              });
              exempted += 1;
            }

            core.info(`pinned issues found: ${pinnedIssueNumbers.length}`);
            core.info(`issues exempted this run: ${exempted}`);

      - name: Mark Stale & Close
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 1000
          days-before-issue-stale: 30
          days-before-issue-close: 335
          exempt-issue-labels: pinned
          stale-issue-label: stale
          stale-issue-message: >
            此 Issue 已超过一个月没有任何活动，已被自动标记为 stale。
            如果该问题仍然有效，请回复评论以恢复活跃状态。
          close-issue-message: >
            此 Issue 已超过一年没有任何活动，现自动关闭。如仍需处理，请重新评论说明。
          days-before-pr-stale: -1
          days-before-pr-close: -1
